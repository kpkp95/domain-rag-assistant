name: Deploy Domain RAG Assistant to EC2

on:
  push:
    branches: [main]
    paths-ignore:
      - "screenshots/**"
      - "README.md"
      - "*.md"

jobs:
  Continuous-Integration:
    name: Build and Push Docker Image to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  Continuous-Deployment:
    name: Pull and Run Docker Image on EC2
    needs: Continuous-Integration
    runs-on: self-hosted

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check disk space before deployment
        run: |
          df -h
          docker system df || true

      - name: Create Docker network
        run: |
          docker network create rag-network || true

      - name: Start Redis container
        run: |
          docker stop redis-rag-memory || true
          docker rm redis-rag-memory || true

          docker run -d \
            --name redis-rag-memory \
            --network rag-network \
            --restart unless-stopped \
            redis:latest

      - name: Stop and remove old app container
        run: |
          docker stop domain-rag-assistant || true
          docker rm domain-rag-assistant || true

      - name: Clean Docker cache
        run: |
          docker system prune -af || true
          docker builder prune -af || true
          rm -rf ~/actions-runner/_diag/* || true

      - name: Check disk space after cleanup
        run: |
          df -h
          docker system df || true

      - name: Pull latest Docker image
        run: |
          docker pull "${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:latest"

      - name: Run Docker container
        run: |
          docker run -d \
            --name domain-rag-assistant \
            --network rag-network \
            --restart unless-stopped \
            -p 8080:8080 \
            -e PINECONE_API_KEY="${{ secrets.PINECONE_API_KEY }}" \
            -e GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            -e FLASK_SECRET_KEY="${{ secrets.FLASK_SECRET_KEY }}" \
            -e REDIS_URL="${{ secrets.REDIS_URL }}" \
            -e CHAT_SESSION_TTL="${{ secrets.CHAT_SESSION_TTL }}" \
            "${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:latest"

      - name: Verify running containers
        run: |
          docker ps
          docker exec redis-rag-memory redis-cli ping
          curl -I http://localhost:8080 || true
